name: Feature or idea
description: Suggest a new feature or an improvement.
title: "[Idea]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea. Describing the problem first (not just the solution) helps us find the best approach together.
  - type: checkboxes
    attributes:
      label: Before you start
      options:
        - label: I have checked STATUS.md and the existing issues, and this is not already planned or suggested.
          required: true
  - type: textarea
    id: problem
    attributes:
      label: The problem
      description: What problem does this solve, or what is missing today?
      placeholder: As a user, I want to ... but right now I cannot ...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see happen?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you thought about, and why this one is better.
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that helps, such as examples from other apps.
    validations:
      required: false
